# #######################################################################################
env = QT_QPA_PLATFORMTHEME,qt6ct
# env = QT_STYLE_OVERRIDE,kvantum
# --- MONITORES ---
monitor=eDP-1, 1920x1080@60, 0x0, 1
# --- PROGRAMAS PADRÃO --
$terminal = alacritty
$fileManager = dolphin
$menu = rofi -show drun

# --- EXECUÇÃO AUTOMÁTICA ---
exec-once = waybar               
exec-once = swww init         
exec-once = dunst
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'               
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hypridle                             

# --- INPUT (TECLADO E MOUSE) ---
input {
    kb_layout = br
    kb_model = thinkpad
    follow_mouse = 1
    mouse_refocus = true
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}
# --- VISUAL (ESTÉTICA) ---

general {
    col.active_border = rgba(8839efff) 45deg
    col.inactive_border = rgba(595959aa)
    border_size = 1
    gaps_in = 2
    gaps_out = 1
}

decoration {
    rounding = 4
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0,0,0,0.3)
    }
    blur {
        enabled = true
        special = true
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default, slidefade 20%
}

# --- ATALHOS DE TECLADO ---
$mainMod = SUPER
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, loginctl terminate-user $USER
bind = $mainMod, V, togglefloating,
bind = $mainMod, G, centerwindow
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,
bind = $mainMod, Page_Down, movetoworkspacesilent, special
bind = $mainMod, Page_Up, togglespecialworkspace
bind = $mainMod, L, exec, hyprlock               

# --- MOVIMENTAÇÃO ---

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# --- PRINTSCREEN ---
bind = , Print, exec, grim - | wl-copy bind = , Print, exec, grim - | wl-copy&& notify-send "Captura de tela" "Imagem copiada para o clipboard!"
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = , Print, exec, grim - | wl-copy
# --- ÁREAS DE TRABALHO ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8


# --- MOUSE ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- KATE E DOLPHIN SEILA ---

# Teclas de Volume (FN + F1, F2, F3 no T490)
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Teclas de Brilho (FN + F5, F6)
binde = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
binde = , XF86MonBrightnessDown, exec, brightnessctl s 10%-
