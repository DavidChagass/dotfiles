########################################################################################

env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# --- MONITORES ---

monitor=eDP-1, 1920x1080@60, 0x0, 1

# --- PROGRAMAS PADRÃO --
$terminal = alacritty
$fileManager = thunar
$menu = rofi -show drun

# --- EXECUÇÃO AUTOMÁTICA ---

exec-once = pkill hyprpaper; hyprpaper
exec-once = pkill waybar; waybar
exec-once = dunst
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'               
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hypridle                             

# --- INPUT (TECLADO E MOUSE) ---

input {
    kb_layout = br
    kb_model = thinkpad
    follow_mouse = 1
    mouse_refocus = true
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

# --- VISUAL (ESTÉTICA) ---

general {
   col.active_border = rgba(a7c080ff) rgba(83c092ff) 45deg
    col.inactive_border = rgba(1e2326aa)
    border_size = 2
    gaps_in = 2
    gaps_out = 4
    col.active_border = rgba(a7c080ee) rgba(83c092ee) 45deg
    col.inactive_border = rgba(2d353b00)
    layout = dwindle
}

decoration {
    rounding = 4
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0,0,0,0.3)
    }
    blur {
        enabled = true
        special = true
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default, slidefade 20%
}

# --- ATALHOS DE TECLADO ---

$mainMod = SUPER
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, loginctl terminate-user $USER
bind = $mainMod, V, togglefloating,
bind = $mainMod, G, centerwindow
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,
bind = $mainMod, Page_Down, movetoworkspacesilent, special
bind = $mainMod, Page_Up, togglespecialworkspace
bind = $mainMod, L, exec, hyprlock               

# --- MOVIMENTAÇÃO ---

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# --- PRINTSCREEN ---

bind = , Print, exec, grim - | wl-copy bind = , Print, exec, grim - | wl-copy&& notify-send "Captura de tela" "Imagem copiada para o clipboard!"
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = , Print, exec, grim - | wl-copy

# --- ÁREAS DE TRABALHO ---

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
 

# --- MOUSE ---

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- KATE E DOLPHIN SEILA ---

# Volume (FN + F1, F2, F3)

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brilho (FN + F5, F6)

binde = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
