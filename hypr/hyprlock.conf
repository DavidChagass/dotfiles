general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = /home/david/Imagens/wallpaper.png   
    blur_passes = 2 55
}

input-field {
    monitor =
    size = 350, 40
    outline_thickness = 3

    dots_size = 0.26 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.34 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rouding = -1

    rounding = 22
    outer_color = $color0
    inner_color = $color0
    font_color = $color6
	check_color = rgb($color2)
	fail_color = rgb(a8323e)
    fade_on_empty = true
    placeholder_text = <i>Password...</i> # Text rendered in the input box when it's empty.

    position = 0, 20%
    halign = center
    valign = bottom
}

# Hours
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $color2
    font_size = 112
    font_family = firaCode Nerd Font 10k
    shadow_passes = 1
    shadow_size = 2

    position = 0, 35%
    halign = center
    valign = center
}

# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $color6
    font_size = 112
    font_family = firaCode Nerd Font 10
    shadow_passes = 1
    shadow_size = 2

    position = 0, 22%
    halign = center
    valign = center
}

# Today
label {
    monitor =
    text = cmd[update:18000000] echo "<i><big> "$(date +'%A')" </big></i>"
    color = $color7
    font_size = 22
    font_family = firaCode Nerd Font 10

    position = 0, 35 
    halign = center
    valign = center
}

# Week
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%b %d')" </b>"
    color = $color7
    font_size = 18
    font_family = firaCode Nerd Font 10

    position = 0, 10
    halign = center
    valign = center
}